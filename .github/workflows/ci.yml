name: Mini-DEX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  lint-and-test-contracts:
    name: Lint & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Lint Rust code
        run: |
          cd packages/contracts
          cargo fmt -- --check
          cargo clippy -- -D warnings

      - name: Build Soroban contract
        run: |
          cd packages/contracts
          cargo build --target wasm32-unknown-unknown --release

      - name: Run contract tests
        run: |
          cd packages/contracts
          cargo test

      - name: Optimize WASM
        run: |
          cd packages/contracts
          cargo install --locked soroban-cli || true
          soroban contract optimize --wasm target/wasm32-unknown-unknown/release/mini_dex.wasm || true

  lint-and-build-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Frontend
        continue-on-error: true
        run: |
          cd packages/frontend
          npm run lint

      - name: Build Frontend
        continue-on-error: true
        run: |
          cd packages/frontend
          npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ADDRESS: 'CDEESHHROI4TRAEKGTQN4R5ZG33KEGYCUP7JKUZKFR3XRKFPHSDT3HYF'
          NEXT_PUBLIC_NETWORK: 'testnet'
          NEXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_ORG: ''
          SENTRY_PROJECT: ''
          SENTRY_AUTH_TOKEN: ''
