name: Mini-DEX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Solidity
        run: |
          cd packages/contracts
          npx solhint 'contracts/**/*.sol'

      - name: Lint TypeScript (Contracts)
        run: |
          cd packages/contracts
          npx eslint '**/*.ts' --max-warnings 50

      - name: Compile contracts
        run: |
          cd packages/contracts
          npx hardhat compile

      - name: Run contract tests
        run: |
          cd packages/contracts
          npx hardhat test

      - name: Generate gas report
        run: |
          cd packages/contracts
          REPORT_GAS=true npx hardhat test > gas-report.txt 2>&1 || true

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: packages/contracts/gas-report.txt
          if-no-files-found: warn

      - name: Lint Frontend
        continue-on-error: true
        run: |
          cd packages/frontend
          npm run lint

      - name: Build Frontend
        continue-on-error: true
        run: |
          cd packages/frontend
          npm run build
        env:
          NEXT_PUBLIC_SIMPLE_POOL_ADDRESS: '0x7D7ff9c51eb5c3dcbeD2751c6F3bd70586eB22Db'
          NEXT_PUBLIC_GEMINI_TOKEN_ADDRESS: '0xEB9B3c675aD7419bcE73fD8eb2d5C9BCDd8a8FD7'
          NEXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_ORG: ''
          SENTRY_PROJECT: ''
          SENTRY_AUTH_TOKEN: ''
